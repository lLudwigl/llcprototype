<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vienna Schwarzkappler Tracker</title>
    <meta name="description" content="Report and track public transport ticket inspectors in Vienna.">
    <!-- Using Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚇 Vienna Schwarzkappler Tracker</h1>
            <p>Report and view current ticket inspector locations on the Wiener Linien.</p>
        </header>

        <main>
            <section class="report-section">
                <h2>Report a Sighting</h2>
                <form id="report-form">
                    <div class="form-group">
                        <label for="location">Station / Location:</label>
                        <input type="text" id="location" name="location" placeholder="e.g. Karlsplatz" required>
                    </div>
                    <div class="form-group">
                        <label for="line">Line:</label>
                        <select id="line" name="line" required>
                            <option value="">Select Line...</option>
                            <option value="U1">🔴 U1</option>
                            <option value="U2">🟣 U2</option>
                            <option value="U3">🟠 U3</option>
                            <option value="U4">🟢 U4</option>
                            <option value="U6">🟤 U6</option>
                            <option value="Tram">🚋 Tram</option>
                            <option value="Bus">🚌 Bus</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="time">Time:</label>
                        <input type="time" id="time" name="time" required>
                    </div>
                    <button type="submit" class="btn pulse-hover">Report Sighting</button>
                </form>
            </section>

            <section class="sightings-section">
                <h2>Recent Sightings <span class="live-indicator"></span></h2>
                <div id="sightings-list" class="sightings-list">
                    <!-- Sightings will go here dynamically -->
                </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
